name: conversation_intelligence
version: 1.0.5
description: Proactive context intelligence for Agent Zero. Background analysis every hour, auto-detects conversation threads, silently injects relevant context into agent awareness.
author: juanm
license: MIT

# Plugin metadata for a0-plugins index
homepage: https://github.com/juanmackie/agent_zero_CONVERSATION_INTELLIGENCE
documentation: https://github.com/juanmackie/agent_zero_CONVERSATION_INTELLIGENCE/blob/main/README.md

# Agent Zero compatibility
min_agent_zero_version: "1.3.0"

# Plugin structure
helpers:
  - helpers/conversation_search.py
  - helpers/context_extractor.py
  - helpers/context_store.py
  - helpers/thread_detector.py

tools:
  - tools/conversation_search.py

prompts:
  - prompts/agent.system.tool.conversation_search.md

# Extensions (use Agent Zero's extension system)
extensions:
  python:
    monologue_start:
      - extensions/python/monologue_start/_50_context_analysis.py
    system_prompt:
      - extensions/python/system_prompt/_20_conversation_context.py

# Hooks for plugin lifecycle
hooks: hooks.py

# Configuration
default_config: default_config.yaml

# Tags for a0-plugins
tags:
  - memory
  - search
  - conversation
  - context
  - proactive
  - background-processing

# Dependencies (all built-in to Agent Zero)
dependencies: []
